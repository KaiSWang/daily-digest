<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KS Daily Digest | 每日資訊電子報</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --surface-alt: #f0ede6;
      --border: #ddd8cf;
      --border-light: #ebe7e0;
      --text: #2e2e2e;
      --text-secondary: #7a756d;
      --text-light: #a09a90;
      --accent-stock: #b07850;
      --accent-stock-light: #f5ede6;
      --accent-ai: #5c7a8a;
      --accent-ai-light: #e8eff3;
      --accent-green: #5a7a5a;
      --accent-red: #a05040;
      --serif: 'Noto Serif TC', 'Georgia', serif;
      --sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 4px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover: 0 2px 8px rgba(0,0,0,0.06);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* === Header === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247, 245, 240, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
    }

    .brand-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 2px;
      font-weight: 300;
    }

    /* === Date Navigation === */
    .date-nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-nav::-webkit-scrollbar { display: none; }

    .date-btn {
      padding: 5px 12px;
      border: none;
      border-radius: 2px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }

    .date-btn:hover {
      background: var(--surface-alt);
      color: var(--text);
    }

    .date-btn.active {
      background: var(--text);
      color: var(--bg);
    }

    .date-btn .weekday {
      font-size: 10px;
      margin-left: 2px;
      opacity: 0.6;
    }

    /* === Main Layout === */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* === Date Display === */
    .date-hero {
      padding: 48px 0 36px;
      text-align: center;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 32px;
    }

    .date-hero-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--text-light);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .date-hero h2 {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 1px;
    }

    .date-hero .issue-num {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* === Column Tabs === */
    .column-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .column-tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: var(--sans);
      font-weight: 400;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.5px;
    }

    .column-tab:hover { color: var(--text-secondary); }

    .column-tab.active { color: var(--text); font-weight: 500; }

    .column-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20px;
      right: 20px;
      height: 2px;
    }

    .column-tab[data-col="stock"].active::after { background: var(--accent-stock); }
    .column-tab[data-col="ai-github"].active::after { background: var(--accent-ai); }

    /* === Content === */
    .content-area { display: none; }
    .content-area.active { display: block; }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 40px 44px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .article-card:hover { box-shadow: var(--shadow-hover); }

    .article-card.stock-card { border-top: 2px solid var(--accent-stock); }
    .article-card.ai-card { border-top: 2px solid var(--accent-ai); }

    /* === Markdown Content === */
    .md-content h1 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      line-height: 1.4;
      color: var(--text);
    }

    .md-content h2 {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 600;
      margin-top: 36px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-light);
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .md-content h3 {
      font-size: 15px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .md-content p {
      margin-bottom: 14px;
      font-size: 14.5px;
      line-height: 2;
      color: #404040;
    }

    .md-content strong {
      color: var(--text);
      font-weight: 600;
    }

    .md-content ul, .md-content ol {
      margin: 8px 0 16px 20px;
    }

    .md-content li {
      margin-bottom: 6px;
      font-size: 14.5px;
      line-height: 1.9;
      color: #404040;
    }

    .md-content li::marker {
      color: var(--text-light);
    }

    .md-content hr {
      border: none;
      height: 0;
      border-top: 1px solid var(--border-light);
      margin: 32px 0;
      position: relative;
    }

    .md-content hr::after {
      content: '◇';
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      padding: 0 12px;
      color: var(--border);
      font-size: 12px;
    }

    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 13px;
    }

    .md-content thead th {
      background: var(--surface-alt);
      padding: 10px 14px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .md-content tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-light);
      color: #404040;
    }

    .md-content tbody tr:hover { background: var(--surface-alt); }

    .md-content blockquote {
      border-left: 2px solid var(--accent-stock);
      padding: 10px 20px;
      margin: 16px 0;
      background: var(--accent-stock-light);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .md-content code {
      font-family: var(--mono);
      background: var(--surface-alt);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12.5px;
      color: var(--accent-ai);
    }

    /* === Loading & Empty === */
    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-ai);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* === Footer === */
    .footer {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      padding: 32px 24px;
      color: var(--text-light);
      font-size: 12px;
      letter-spacing: 0.5px;
      border-top: 1px solid var(--border-light);
    }

    .footer a {
      color: var(--accent-ai);
      text-decoration: none;
    }

    .footer-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 4px;
    }

    .footer-dot { color: var(--border); }

    /* === Scroll to Top === */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 50;
      box-shadow: var(--shadow);
    }

    .scroll-top:hover {
      background: var(--surface-alt);
      box-shadow: var(--shadow-hover);
    }

    .scroll-top.visible { display: flex; }

    /* === Responsive === */
    @media (max-width: 768px) {
      .header-inner { padding: 10px 16px; }
      .brand-sub { display: none; }
      .brand-divider { display: none; }
      .main { padding: 0 16px 40px; }
      .article-card { padding: 24px 20px; }
      .md-content h1 { font-size: 19px; }
      .md-content h2 { font-size: 16px; }
      .date-hero { padding: 32px 0 24px; }
      .date-hero h2 { font-size: 22px; }
      .column-tab { padding: 8px 14px; font-size: 13px; }
      .md-content table { font-size: 12px; }
      .md-content thead th, .md-content tbody td { padding: 7px 8px; }
    }

    /* === Print === */
    @media print {
      .header, .date-nav, .column-tabs, .scroll-top, .footer { display: none; }
      .content-area { display: block !important; }
      .article-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark">KS Daily</span>
        <div class="brand-divider"></div>
        <span class="brand-sub">每日資訊電子報</span>
      </div>
      <nav class="date-nav" id="dateNav"></nav>
    </div>
  </header>

  <main class="main">
    <div class="date-hero" id="dateDisplay">
      <div class="date-hero-label">Daily Digest</div>
      <h2 id="dateTitle"></h2>
      <p class="issue-num" id="dateSubtitle"></p>
    </div>

    <div class="column-tabs" id="columnTabs">
      <button class="column-tab active" data-col="stock" onclick="switchColumn('stock')">
        美股分析
      </button>
      <button class="column-tab" data-col="ai-github" onclick="switchColumn('ai-github')">
        AI / GitHub 趨勢
      </button>
    </div>

    <div class="content-area active" id="content-stock">
      <div class="loading-state" id="loading-stock">
        <div class="loading-spinner"></div>
        <p>載入中</p>
      </div>
      <div class="article-card stock-card" id="article-stock" style="display:none;">
        <div class="md-content" id="md-stock"></div>
      </div>
    </div>

    <div class="content-area" id="content-ai-github">
      <div class="loading-state" id="loading-ai-github">
        <div class="loading-spinner"></div>
        <p>載入中</p>
      </div>
      <div class="article-card ai-card" id="article-ai-github" style="display:none;">
        <div class="md-content" id="md-ai-github"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-line">
      <span>KS Daily Digest</span>
      <span class="footer-dot">·</span>
      <span>自動產出，每日更新</span>
    </div>
    <p>Powered by Claude AI <span class="footer-dot">·</span> <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script>
    const BASE_URL = '';
    let currentDate = null;
    let currentColumn = 'stock';
    let manifest = null;
    let contentCache = {};
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

    function getWeekday(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return '週' + weekdays[d.getDay()];
    }

    function formatDateShort(dateStr) {
      const parts = dateStr.split('-');
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }

    function formatDateFull(dateStr) {
      const parts = dateStr.split('-');
      return `${parts[0]} 年 ${parseInt(parts[1])} 月 ${parseInt(parts[2])} 日　${getWeekday(dateStr)}`;
    }

    async function loadManifest() {
      try {
        const res = await fetch(`${BASE_URL}data/manifest.json?t=${Date.now()}`);
        manifest = await res.json();
        return manifest;
      } catch (e) {
        console.error('Failed to load manifest:', e);
        return null;
      }
    }

    function renderDateNav() {
      const nav = document.getElementById('dateNav');
      nav.innerHTML = '';
      manifest.dates.forEach(date => {
        const btn = document.createElement('button');
        btn.className = `date-btn ${date === currentDate ? 'active' : ''}`;
        btn.innerHTML = `${formatDateShort(date)} <span class="weekday">${getWeekday(date)}</span>`;
        btn.onclick = () => selectDate(date);
        nav.appendChild(btn);
      });
    }

    function selectDate(date) {
      currentDate = date;
      document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
      const btns = document.querySelectorAll('.date-btn');
      const idx = manifest.dates.indexOf(date);
      if (btns[idx]) btns[idx].classList.add('active');

      document.getElementById('dateTitle').textContent = formatDateFull(date);
      document.getElementById('dateSubtitle').textContent = `No. ${manifest.dates.length - idx} / ${manifest.dates.length}`;

      loadContent('stock', date);
      loadContent('ai-github', date);
    }

    function switchColumn(col) {
      currentColumn = col;
      document.querySelectorAll('.column-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.column-tab[data-col="${col}"]`).classList.add('active');
      document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
      document.getElementById(`content-${col}`).classList.add('active');
    }

    function getFilePath(colId, date) {
      const col = manifest.columns.find(c => c.id === colId);
      if (!col) return [];
      const primary = `data/${colId}/${col.filePattern.replace('{date}', date)}`;
      const alts = (col.altPatterns || []).map(p => `data/${colId}/${p.replace('{date}', date)}`);
      return [primary, ...alts];
    }

    async function loadContent(colId, date) {
      const cacheKey = `${colId}-${date}`;
      const loadingEl = document.getElementById(`loading-${colId}`);
      const articleEl = document.getElementById(`article-${colId}`);
      const mdEl = document.getElementById(`md-${colId}`);

      loadingEl.style.display = 'block';
      articleEl.style.display = 'none';

      if (contentCache[cacheKey]) {
        renderMarkdown(mdEl, contentCache[cacheKey]);
        loadingEl.style.display = 'none';
        articleEl.style.display = 'block';
        return;
      }

      const paths = getFilePath(colId, date);
      let content = null;

      for (const path of paths) {
        try {
          const res = await fetch(`${BASE_URL}${path}?t=${Date.now()}`);
          if (res.ok) { content = await res.text(); break; }
        } catch (e) { continue; }
      }

      loadingEl.style.display = 'none';

      if (content) {
        contentCache[cacheKey] = content;
        renderMarkdown(mdEl, content);
        articleEl.style.display = 'block';
      } else {
        articleEl.style.display = 'block';
        mdEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">—</div>
            <p>此日期尚無${colId === 'stock' ? '美股分析' : 'AI / GitHub 趨勢'}報告</p>
            <p style="font-size:12px;margin-top:6px;color:var(--text-light)">報告將在排程任務執行後自動產生</p>
          </div>`;
      }
    }

    function renderMarkdown(el, md) {
      const cleanMd = md
        .replace(/⚠️ 寄信失敗.*$/gm, '')
        .replace(/✅ (摘要已透過|Email).*$/gm, '')
        .replace(/⚠️ LINE 推播.*$/gm, '')
        .replace(/\[查看完整報告\].*$/gm, '')
        .trim();

      el.innerHTML = marked.parse(cleanMd);

      el.querySelectorAll('strong').forEach(strong => {
        const text = strong.textContent;
        if (text.includes('+') && text.match(/[\d.]+%/)) {
          strong.style.color = 'var(--accent-green)';
        } else if (text.includes('-') && text.match(/[\d.]+%/)) {
          strong.style.color = 'var(--accent-red)';
        }
      });
    }

    window.addEventListener('scroll', () => {
      document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 300);
    });

    async function init() {
      const m = await loadManifest();
      if (!m) {
        document.querySelector('.main').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">—</div>
            <p>無法載入資料</p>
          </div>`;
        return;
      }
      currentDate = manifest.dates[0];
      renderDateNav();
      selectDate(currentDate);
    }

    init();
  </script>
</body>
</html>
