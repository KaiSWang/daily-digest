<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KS Daily Digest | 每日資訊電子報</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f12;
      --surface: #1a1a22;
      --surface-hover: #22222e;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-secondary: #9090a8;
      --accent-stock: #f59e0b;
      --accent-stock-dim: rgba(245, 158, 11, 0.12);
      --accent-ai: #8b5cf6;
      --accent-ai-dim: rgba(139, 92, 246, 0.12);
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 15, 18, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-stock), var(--accent-ai));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: white;
    }

    .brand-text h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand-text p {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* Date Navigation */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .date-nav::-webkit-scrollbar { display: none; }

    .date-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .date-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text);
    }

    .date-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
      font-weight: 500;
    }

    .date-btn .weekday {
      font-size: 11px;
      opacity: 0.7;
    }

    /* Main Content */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .date-display {
      text-align: center;
      padding: 32px 0 24px;
    }

    .date-display h2 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent-stock), var(--accent-ai));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .date-display .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }

    /* Column Tabs */
    .column-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .column-tab {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .column-tab:hover { color: var(--text); }

    .column-tab.active { color: var(--text); }

    .column-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 2px;
    }

    .column-tab[data-col="stock"].active::after {
      background: var(--accent-stock);
    }

    .column-tab[data-col="ai-github"].active::after {
      background: var(--accent-ai);
    }

    .column-tab .tab-icon { font-size: 18px; }

    /* Content Area */
    .content-area {
      display: none;
    }

    .content-area.active {
      display: block;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }

    .article-card:hover {
      border-color: #3a3a50;
    }

    .article-card.stock-card {
      border-top: 3px solid var(--accent-stock);
    }

    .article-card.ai-card {
      border-top: 3px solid var(--accent-ai);
    }

    /* Markdown Rendered Content */
    .md-content h1 {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      line-height: 1.3;
    }

    .md-content h2 {
      font-size: 20px;
      font-weight: 700;
      margin-top: 32px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.3px;
    }

    .md-content h3 {
      font-size: 17px;
      font-weight: 700;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .md-content p {
      margin-bottom: 12px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
    }

    .md-content strong {
      color: #fff;
      font-weight: 700;
    }

    .md-content ul, .md-content ol {
      margin: 8px 0 16px 24px;
    }

    .md-content li {
      margin-bottom: 6px;
      font-size: 15px;
      line-height: 1.7;
    }

    .md-content hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }

    .md-content thead th {
      background: var(--surface-hover);
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .md-content tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .md-content tbody tr:hover {
      background: var(--surface-hover);
    }

    .md-content blockquote {
      border-left: 3px solid var(--accent-stock);
      padding: 8px 16px;
      margin: 12px 0;
      background: rgba(245, 158, 11, 0.05);
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
    }

    .md-content code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-hover);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* Loading & Empty States */
    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-ai);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-secondary);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .footer a {
      color: var(--accent-ai);
      text-decoration: none;
    }

    /* Table of Contents / Quick Nav */
    .quick-nav {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .quick-nav-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .quick-nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-nav-link {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .quick-nav-link:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .quick-nav-link.stock-link:hover { background: var(--accent-stock-dim); color: var(--accent-stock); }
    .quick-nav-link.ai-link:hover { background: var(--accent-ai-dim); color: var(--accent-ai); }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner {
        padding: 12px 16px;
      }

      .main { padding: 16px; }

      .article-card { padding: 20px; }

      .md-content h1 { font-size: 20px; }
      .md-content h2 { font-size: 18px; }

      .date-display h2 { font-size: 22px; }

      .column-tab { padding: 10px 14px; font-size: 14px; }

      .md-content table { font-size: 12px; }
      .md-content thead th, .md-content tbody td { padding: 6px 8px; }
    }

    /* Scroll to Top */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 50;
    }

    .scroll-top:hover {
      background: var(--surface-hover);
      transform: translateY(-2px);
    }

    .scroll-top.visible { display: flex; }

    /* Status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-up { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
    .status-down { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">K</div>
        <div class="brand-text">
          <h1>KS Daily Digest</h1>
          <p>每日資訊電子報</p>
        </div>
      </div>
      <nav class="date-nav" id="dateNav"></nav>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="date-display" id="dateDisplay">
      <h2 id="dateTitle"></h2>
      <p class="subtitle" id="dateSubtitle"></p>
    </div>

    <!-- Column Tabs -->
    <div class="column-tabs" id="columnTabs">
      <button class="column-tab active" data-col="stock" onclick="switchColumn('stock')">
        <span class="tab-icon">📊</span> 每日美股分析
      </button>
      <button class="column-tab" data-col="ai-github" onclick="switchColumn('ai-github')">
        <span class="tab-icon">🤖</span> AI / GitHub 趨勢
      </button>
    </div>

    <!-- Stock Content -->
    <div class="content-area active" id="content-stock">
      <div class="loading-state" id="loading-stock">
        <div class="loading-spinner"></div>
        <p>載入中...</p>
      </div>
      <div class="article-card stock-card" id="article-stock" style="display:none;">
        <div class="md-content" id="md-stock"></div>
      </div>
    </div>

    <!-- AI/GitHub Content -->
    <div class="content-area" id="content-ai-github">
      <div class="loading-state" id="loading-ai-github">
        <div class="loading-spinner"></div>
        <p>載入中...</p>
      </div>
      <div class="article-card ai-card" id="article-ai-github" style="display:none;">
        <div class="md-content" id="md-ai-github"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>KS Daily Digest &mdash; 自動產出，每日更新</p>
    <p style="margin-top:4px;">Powered by Claude AI | Hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script>
    // === Configuration ===
    const BASE_URL = ''; // Will be relative to index.html

    // === State ===
    let currentDate = null;
    let currentColumn = 'stock';
    let manifest = null;
    let contentCache = {};

    // === Weekday Names ===
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

    function getWeekday(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return '週' + weekdays[d.getDay()];
    }

    function formatDateShort(dateStr) {
      const parts = dateStr.split('-');
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }

    function formatDateFull(dateStr) {
      const parts = dateStr.split('-');
      return `${parts[0]} 年 ${parseInt(parts[1])} 月 ${parseInt(parts[2])} 日（${getWeekday(dateStr)}）`;
    }

    // === Load Manifest ===
    async function loadManifest() {
      try {
        const res = await fetch(`${BASE_URL}data/manifest.json?t=${Date.now()}`);
        manifest = await res.json();
        return manifest;
      } catch (e) {
        console.error('Failed to load manifest:', e);
        // Fallback: try to detect available dates
        return null;
      }
    }

    // === Render Date Navigation ===
    function renderDateNav() {
      const nav = document.getElementById('dateNav');
      nav.innerHTML = '';
      manifest.dates.forEach(date => {
        const btn = document.createElement('button');
        btn.className = `date-btn ${date === currentDate ? 'active' : ''}`;
        btn.innerHTML = `${formatDateShort(date)} <span class="weekday">${getWeekday(date)}</span>`;
        btn.onclick = () => selectDate(date);
        nav.appendChild(btn);
      });
    }

    // === Select Date ===
    function selectDate(date) {
      currentDate = date;
      // Update nav buttons
      document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
      const btns = document.querySelectorAll('.date-btn');
      const idx = manifest.dates.indexOf(date);
      if (btns[idx]) btns[idx].classList.add('active');

      // Update display
      document.getElementById('dateTitle').textContent = formatDateFull(date);
      document.getElementById('dateSubtitle').textContent = `第 ${manifest.dates.length - idx} / ${manifest.dates.length} 期`;

      // Load content
      loadContent('stock', date);
      loadContent('ai-github', date);
    }

    // === Switch Column ===
    function switchColumn(col) {
      currentColumn = col;
      document.querySelectorAll('.column-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.column-tab[data-col="${col}"]`).classList.add('active');
      document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
      document.getElementById(`content-${col}`).classList.add('active');
    }

    // === Resolve File Path ===
    function getFilePath(colId, date) {
      const col = manifest.columns.find(c => c.id === colId);
      if (!col) return null;

      // Primary pattern
      const primary = `data/${colId}/${col.filePattern.replace('{date}', date)}`;

      // Alt patterns
      const alts = (col.altPatterns || []).map(p => `data/${colId}/${p.replace('{date}', date)}`);

      return [primary, ...alts];
    }

    // === Load Content ===
    async function loadContent(colId, date) {
      const cacheKey = `${colId}-${date}`;

      // Show loading
      const loadingEl = document.getElementById(`loading-${colId}`);
      const articleEl = document.getElementById(`article-${colId}`);
      const mdEl = document.getElementById(`md-${colId}`);

      loadingEl.style.display = 'block';
      articleEl.style.display = 'none';

      // Check cache
      if (contentCache[cacheKey]) {
        renderMarkdown(mdEl, contentCache[cacheKey]);
        loadingEl.style.display = 'none';
        articleEl.style.display = 'block';
        return;
      }

      // Try to fetch
      const paths = getFilePath(colId, date);
      let content = null;

      for (const path of paths) {
        try {
          const res = await fetch(`${BASE_URL}${path}?t=${Date.now()}`);
          if (res.ok) {
            content = await res.text();
            break;
          }
        } catch (e) {
          continue;
        }
      }

      loadingEl.style.display = 'none';

      if (content) {
        contentCache[cacheKey] = content;
        renderMarkdown(mdEl, content);
        articleEl.style.display = 'block';
      } else {
        // Show empty state
        mdEl.innerHTML = '';
        articleEl.style.display = 'block';
        mdEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>此日期尚無 ${colId === 'stock' ? '美股分析' : 'AI/GitHub 趨勢'} 報告</p>
            <p style="font-size:13px;margin-top:8px;color:var(--text-secondary)">報告將在排程任務執行後自動產生</p>
          </div>
        `;
      }
    }

    // === Render Markdown ===
    function renderMarkdown(el, md) {
      // Clean up email/LINE status lines at the bottom
      const cleanMd = md
        .replace(/⚠️ 寄信失敗.*$/gm, '')
        .replace(/✅ (摘要已透過|Email).*$/gm, '')
        .replace(/⚠️ LINE 推播.*$/gm, '')
        .replace(/\[查看完整報告\].*$/gm, '')
        .trim();

      el.innerHTML = marked.parse(cleanMd);

      // Post-process: highlight positive/negative indicators
      el.querySelectorAll('strong').forEach(strong => {
        const text = strong.textContent;
        if (text.includes('+') && text.match(/[\d.]+%/)) {
          strong.style.color = 'var(--accent-green)';
        } else if (text.includes('-') && text.match(/[\d.]+%/)) {
          strong.style.color = 'var(--accent-red)';
        }
      });
    }

    // === Scroll to Top Button ===
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('scrollTop');
      btn.classList.toggle('visible', window.scrollY > 300);
    });

    // === Initialize ===
    async function init() {
      const m = await loadManifest();
      if (!m) {
        document.querySelector('.main').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <p>無法載入資料，請確認 manifest.json 是否存在</p>
          </div>
        `;
        return;
      }

      // Default to latest date
      currentDate = manifest.dates[0];
      renderDateNav();
      selectDate(currentDate);
    }

    init();
  </script>
</body>
</html>
