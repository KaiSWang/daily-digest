<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KS Daily Digest | 每日資訊電子報</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --surface-alt: #f0ede6;
      --border: #ddd8cf;
      --border-light: #ebe7e0;
      --text: #2e2e2e;
      --text-secondary: #7a756d;
      --text-light: #a09a90;
      --accent-stock: #b07850;
      --accent-stock-light: #f5ede6;
      --accent-ai: #5c7a8a;
      --accent-ai-light: #e8eff3;
      --accent-commodity: #8a7a5c;
      --accent-commodity-light: #f0ede2;
      --accent-cycle: #6a7a6a;
      --accent-cycle-light: #e8ede8;
      --accent-green: #5a7a5a;
      --accent-red: #a05040;
      --serif: 'Noto Serif TC', 'Georgia', serif;
      --sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 4px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hover: 0 2px 8px rgba(0,0,0,0.06);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* === Header === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(247, 245, 240, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-mark {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      cursor: pointer;
    }

    .brand-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 2px;
      font-weight: 300;
    }

    /* === Section Navigation (top-level) === */
    .section-nav {
      display: flex;
      gap: 0;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .section-btn {
      padding: 10px 18px;
      border: none;
      background: transparent;
      color: var(--text-light);
      font-size: 13.5px;
      font-family: var(--sans);
      font-weight: 400;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .section-btn:hover { color: var(--text-secondary); }
    .section-btn.active { color: var(--text); font-weight: 500; }

    .section-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 18px;
      right: 18px;
      height: 2px;
      background: var(--text);
    }

    /* === Date Navigation === */
    .date-nav-bar {
      max-width: 800px;
      margin: 0 auto;
      padding: 8px 24px;
      border-bottom: 1px solid var(--border-light);
    }

    .date-nav-bar.hidden { display: none; }

    .date-nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-nav::-webkit-scrollbar { display: none; }

    .date-btn {
      padding: 5px 12px;
      border: none;
      border-radius: 2px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }

    .date-btn:hover { background: var(--surface-alt); color: var(--text); }
    .date-btn.active { background: var(--text); color: var(--bg); }
    .date-btn .weekday { font-size: 10px; margin-left: 2px; opacity: 0.6; }

    /* === Main Layout === */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* === Date Display === */
    .date-hero {
      padding: 48px 0 36px;
      text-align: center;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 32px;
    }

    .date-hero.hidden { display: none; }

    .date-hero-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--text-light);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .date-hero h2 {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 1px;
    }

    .date-hero .issue-num {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* === Column Tabs (sub-tabs within 每日報告) === */
    .column-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .column-tabs.hidden { display: none; }

    .column-tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 14px;
      font-family: var(--sans);
      font-weight: 400;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.5px;
    }

    .column-tab:hover { color: var(--text-secondary); }
    .column-tab.active { color: var(--text); font-weight: 500; }

    .column-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20px;
      right: 20px;
      height: 2px;
    }

    .column-tab[data-col="stock"].active::after { background: var(--accent-stock); }
    .column-tab[data-col="ai-github"].active::after { background: var(--accent-ai); }

    /* === Content === */
    .content-area { display: none; }
    .content-area.active { display: block; }
    .page-section { display: none; }
    .page-section.active { display: block; }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 40px 44px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .article-card:hover { box-shadow: var(--shadow-hover); }
    .article-card.stock-card { border-top: 2px solid var(--accent-stock); }
    .article-card.ai-card { border-top: 2px solid var(--accent-ai); }

    /* === Markdown Content === */
    .md-content h1 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      line-height: 1.4;
      color: var(--text);
    }

    .md-content h2 {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 600;
      margin-top: 36px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-light);
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .md-content h3 {
      font-size: 15px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .md-content p {
      margin-bottom: 14px;
      font-size: 14.5px;
      line-height: 2;
      color: #404040;
    }

    .md-content strong { color: var(--text); font-weight: 600; }

    .md-content ul, .md-content ol { margin: 8px 0 16px 20px; }

    .md-content li {
      margin-bottom: 6px;
      font-size: 14.5px;
      line-height: 1.9;
      color: #404040;
    }

    .md-content li::marker { color: var(--text-light); }

    .md-content hr {
      border: none;
      height: 0;
      border-top: 1px solid var(--border-light);
      margin: 32px 0;
      position: relative;
    }

    .md-content hr::after {
      content: '◇';
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      padding: 0 12px;
      color: var(--border);
      font-size: 12px;
    }

    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 13px;
    }

    .md-content thead th {
      background: var(--surface-alt);
      padding: 10px 14px;
      text-align: left;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .md-content tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-light);
      color: #404040;
    }

    .md-content tbody tr:hover { background: var(--surface-alt); }

    .md-content blockquote {
      border-left: 2px solid var(--accent-stock);
      padding: 10px 20px;
      margin: 16px 0;
      background: var(--accent-stock-light);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .md-content code {
      font-family: var(--mono);
      background: var(--surface-alt);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12.5px;
      color: var(--accent-ai);
    }

    .md-content a {
      color: var(--accent-ai);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .md-content a:hover { border-bottom-color: var(--accent-ai); }

    /* === Commodity Section === */
    .commodity-section {
      padding-top: 36px;
    }

    .commodity-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .commodity-header h2 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .commodity-header p {
      font-size: 13px;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    .commodity-updated {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .commodity-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .commodity-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .commodity-card:hover { box-shadow: var(--shadow-hover); }

    .commodity-card-header {
      padding: 14px 18px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .commodity-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .commodity-name-en {
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    .commodity-chart {
      height: 220px;
      width: 100%;
    }

    .commodity-chart iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* === Cycle Section === */
    .cycle-section {
      padding-top: 36px;
    }

    .cycle-header {
      text-align: center;
      margin-bottom: 12px;
    }

    .cycle-header h2 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .cycle-header p {
      font-size: 13px;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    .cycle-updated {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .cycle-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .cycle-card:hover { box-shadow: var(--shadow-hover); }

    .cycle-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .cycle-card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .cycle-card-phase {
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .phase-bottom { background: #e8e3f0; color: #6a5a8a; }
    .phase-recovery { background: #e2ecf0; color: #4a7a8a; }
    .phase-growth { background: #e2ede2; color: #4a7a4a; }
    .phase-peak { background: #f0e8e0; color: #8a6a4a; }
    .phase-decline { background: #f0e2e2; color: #8a4a4a; }

    .cycle-bar-container {
      position: relative;
      height: 8px;
      background: var(--surface-alt);
      border-radius: 4px;
      margin-bottom: 14px;
      overflow: visible;
    }

    .cycle-bar-track {
      display: flex;
      height: 100%;
      border-radius: 4px;
      overflow: hidden;
    }

    .cycle-bar-segment {
      height: 100%;
      flex: 1;
    }

    .cycle-bar-segment:nth-child(1) { background: #c4b8d8; }
    .cycle-bar-segment:nth-child(2) { background: #a8c8d4; }
    .cycle-bar-segment:nth-child(3) { background: #a8d4a8; }
    .cycle-bar-segment:nth-child(4) { background: #d4c4a0; }
    .cycle-bar-segment:nth-child(5) { background: #d4a8a8; }

    .cycle-bar-pointer {
      position: absolute;
      top: -4px;
      width: 16px;
      height: 16px;
      background: var(--text);
      border-radius: 50%;
      border: 2px solid var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      transform: translateX(-50%);
      transition: left 0.4s ease;
    }

    .cycle-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-light);
      letter-spacing: 0.3px;
    }

    .cycle-card-indicators {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .cycle-indicator {
      font-size: 12px;
      padding: 3px 10px;
      background: var(--surface-alt);
      border-radius: 3px;
      color: var(--text-secondary);
    }

    .cycle-card-note {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-top: 10px;
    }

    .cycle-signal { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; margin-left:8px; font-weight:600; }
    .cycle-signal-GREEN { background:#dff5df; color:#2d6a2d; }
    .cycle-signal-YELLOW { background:#fff4d1; color:#8a6a00; }
    .cycle-signal-ORANGE { background:#ffe4cc; color:#a04a00; }
    .cycle-signal-RED { background:#ffd6d6; color:#9a2222; }
    .cycle-watchlist { font-size:12px; color:var(--text-light); margin-top:6px; }
    .cycle-watchlist b { color:var(--text-dark); }
    .cycle-details { margin-top:10px; font-size:12px; }
    .cycle-details summary { cursor:pointer; color:var(--text-light); padding:4px 0; user-select:none; }
    .cycle-details summary:hover { color:var(--text-dark); }
    .cycle-details[open] summary { color:var(--text-dark); font-weight:600; }
    .cycle-details-body { padding:8px 12px; background:#f7f7f5; border-radius:6px; margin-top:6px; line-height:1.6; }
    .cycle-score-row { display:flex; justify-content:space-between; padding:2px 0; }
    .cycle-score-bar { display:inline-block; height:6px; background:#a8d4a8; border-radius:3px; vertical-align:middle; margin:0 6px; }
    .cycle-methodology { margin:16px 0; padding:10px 14px; background:#fafafa; border:1px solid #eee; border-radius:6px; font-size:13px; }
    .cycle-methodology summary { cursor:pointer; font-weight:600; color:#444; }
    .cycle-methodology[open] { background:#f4f4f0; }
    .cycle-trend-up::before { content: '▲ '; color: var(--accent-green); font-size: 10px; }
    .cycle-trend-down::before { content: '▼ '; color: var(--accent-red); font-size: 10px; }
    .cycle-trend-flat::before { content: '— '; color: var(--text-light); font-size: 10px; }

    .cycle-legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .cycle-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .cycle-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    /* === Loading & Empty === */
    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-ai);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* === Footer === */
    .footer {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      padding: 32px 24px;
      color: var(--text-light);
      font-size: 12px;
      letter-spacing: 0.5px;
      border-top: 1px solid var(--border-light);
    }

    .footer a { color: var(--accent-ai); text-decoration: none; }

    .footer-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 4px;
    }

    .footer-dot { color: var(--border); }

    /* === Scroll to Top === */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 50;
      box-shadow: var(--shadow);
    }

    .scroll-top:hover { background: var(--surface-alt); box-shadow: var(--shadow-hover); }
    .scroll-top.visible { display: flex; }

    /* === Responsive === */
    @media (max-width: 768px) {
      .header-inner { padding: 10px 16px; }
      .brand-sub { display: none; }
      .brand-divider { display: none; }
      .section-nav { padding: 0 12px; overflow-x: auto; scrollbar-width: none; }
      .section-nav::-webkit-scrollbar { display: none; }
      .section-btn { padding: 10px 12px; font-size: 13px; }
      .date-nav-bar { padding: 8px 16px; }
      .main { padding: 0 16px 40px; }
      .article-card { padding: 24px 20px; }
      .md-content h1 { font-size: 19px; }
      .md-content h2 { font-size: 16px; }
      .date-hero { padding: 32px 0 24px; }
      .date-hero h2 { font-size: 22px; }
      .column-tab { padding: 8px 14px; font-size: 13px; }
      .commodity-grid { grid-template-columns: 1fr; }
      .commodity-chart { height: 200px; }
      .cycle-card { padding: 18px 16px; }
      .cycle-bar-labels { font-size: 9px; }
    }

    /* === Print === */
    @media print {
      .header, .section-nav, .date-nav-bar, .column-tabs, .scroll-top, .footer { display: none; }
      .content-area { display: block !important; }
      .article-card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark" onclick="switchSection('daily')">KS Daily</span>
        <div class="brand-divider"></div>
        <span class="brand-sub">每日資訊電子報</span>
      </div>
    </div>
  </header>

  <!-- Top-level section navigation -->
  <nav class="section-nav" id="sectionNav">
    <button class="section-btn active" data-section="daily" onclick="switchSection('daily')">每日報告</button>
    <button class="section-btn" data-section="commodity" onclick="switchSection('commodity')">大宗商品走勢</button>
    <button class="section-btn" data-section="cycle" onclick="switchSection('cycle')">產業循環水位</button>
  </nav>

  <!-- Date navigation (only for daily reports) -->
  <div class="date-nav-bar" id="dateNavBar">
    <nav class="date-nav" id="dateNav"></nav>
  </div>

  <main class="main">

    <!-- ==================== Section: 每日報告 ==================== -->
    <div class="page-section active" id="section-daily">
      <div class="date-hero" id="dateDisplay">
        <div class="date-hero-label">Daily Digest</div>
        <h2 id="dateTitle"></h2>
        <p class="issue-num" id="dateSubtitle"></p>
      </div>

      <div class="column-tabs" id="columnTabs">
        <button class="column-tab active" data-col="stock" onclick="switchColumn('stock')">美股分析</button>
        <button class="column-tab" data-col="ai-github" onclick="switchColumn('ai-github')">AI / GitHub 趨勢</button>
      </div>

      <div class="content-area active" id="content-stock">
        <div class="loading-state" id="loading-stock">
          <div class="loading-spinner"></div>
          <p>載入中</p>
        </div>
        <div class="article-card stock-card" id="article-stock" style="display:none;">
          <div class="md-content" id="md-stock"></div>
        </div>
      </div>

      <div class="content-area" id="content-ai-github">
        <div class="loading-state" id="loading-ai-github">
          <div class="loading-spinner"></div>
          <p>載入中</p>
        </div>
        <div class="article-card ai-card" id="article-ai-github" style="display:none;">
          <div class="md-content" id="md-ai-github"></div>
        </div>
      </div>
    </div>

    <!-- ==================== Section: 大宗商品走勢 ==================== -->
    <div class="page-section" id="section-commodity">
      <div class="commodity-section">
        <div class="commodity-header">
          <h2>大宗商品 30 日走勢</h2>
          <p>即時數據 · 自動更新 · 來源 TradingView</p>
          <p class="commodity-updated" id="commodityUpdated"></p>
        </div>
        <div class="commodity-grid" id="commodityGrid"></div>
      </div>
    </div>

    <!-- ==================== Section: 產業循環水位 ==================== -->
    <div class="page-section" id="section-cycle">
      <div class="cycle-section">
        <div class="cycle-header">
          <h2>產業循環週期水位表</h2>
          <p>追蹤各產業景氣位置與關鍵指標</p>
        </div>
        <div class="cycle-updated" id="cycleUpdated"></div>
        <div class="cycle-legend">
          <div class="cycle-legend-item"><div class="cycle-legend-dot" style="background:#c4b8d8"></div>谷底</div>
          <div class="cycle-legend-item"><div class="cycle-legend-dot" style="background:#a8c8d4"></div>復甦</div>
          <div class="cycle-legend-item"><div class="cycle-legend-dot" style="background:#a8d4a8"></div>成長</div>
          <div class="cycle-legend-item"><div class="cycle-legend-dot" style="background:#d4c4a0"></div>高峰</div>
          <div class="cycle-legend-item"><div class="cycle-legend-dot" style="background:#d4a8a8"></div>衰退</div>
        </div>
        <div id="cycleCards">
          <div class="loading-state" id="loading-cycle">
            <div class="loading-spinner"></div>
            <p>載入產業循環資料中</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-line">
      <span>KS Daily Digest</span>
      <span class="footer-dot">·</span>
      <span>自動產出，每日更新</span>
    </div>
    <p>Powered by Claude AI <span class="footer-dot">·</span> <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script>
    const BASE_URL = '';
    let currentDate = null;
    let currentColumn = 'stock';
    let currentSection = 'daily';
    let manifest = null;
    let contentCache = {};
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

    /* === Commodity Config === */
    const commodities = [
      { name: '黃金', nameEn: 'Gold', symbol: 'OANDA:XAUUSD' },
      { name: '白銀', nameEn: 'Silver', symbol: 'OANDA:XAGUSD' },
      { name: 'WTI 原油', nameEn: 'Crude Oil WTI', symbol: 'TVC:USOIL' },
      { name: '布蘭特原油', nameEn: 'Brent Crude', symbol: 'TVC:UKOIL' },
      { name: '天然氣', nameEn: 'Natural Gas', symbol: 'PEPPERSTONE:NATGAS' },
    ];

    /* === Helpers === */
    function getWeekday(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return '週' + weekdays[d.getDay()];
    }

    function formatDateShort(dateStr) {
      const parts = dateStr.split('-');
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }

    function formatDateFull(dateStr) {
      const parts = dateStr.split('-');
      return `${parts[0]} 年 ${parseInt(parts[1])} 月 ${parseInt(parts[2])} 日　${getWeekday(dateStr)}`;
    }

    /* === Section Switching === */
    function switchSection(section) {
      currentSection = section;

      document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.section-btn[data-section="${section}"]`).classList.add('active');

      document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
      document.getElementById(`section-${section}`).classList.add('active');

      // Show/hide date nav
      const dateBar = document.getElementById('dateNavBar');
      if (section === 'daily') {
        dateBar.classList.remove('hidden');
      } else {
        dateBar.classList.add('hidden');
      }

      // Lazy-load commodity charts
      if (section === 'commodity' && !document.getElementById('commodityGrid').hasChildNodes()) {
        renderCommodityCharts();
      }

      // Lazy-load cycle data
      if (section === 'cycle' && document.getElementById('loading-cycle')) {
        loadCycleData();
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* === Manifest & Daily Reports === */
    async function loadManifest() {
      try {
        const res = await fetch(`${BASE_URL}data/manifest.json?t=${Date.now()}`);
        manifest = await res.json();
        return manifest;
      } catch (e) {
        console.error('Failed to load manifest:', e);
        return null;
      }
    }

    function renderDateNav() {
      const nav = document.getElementById('dateNav');
      nav.innerHTML = '';
      manifest.dates.forEach(date => {
        const btn = document.createElement('button');
        btn.className = `date-btn ${date === currentDate ? 'active' : ''}`;
        btn.innerHTML = `${formatDateShort(date)} <span class="weekday">${getWeekday(date)}</span>`;
        btn.onclick = () => selectDate(date);
        nav.appendChild(btn);
      });
    }

    function selectDate(date) {
      currentDate = date;
      document.querySelectorAll('.date-btn').forEach(btn => btn.classList.remove('active'));
      const btns = document.querySelectorAll('.date-btn');
      const idx = manifest.dates.indexOf(date);
      if (btns[idx]) btns[idx].classList.add('active');

      document.getElementById('dateTitle').textContent = formatDateFull(date);
      document.getElementById('dateSubtitle').textContent = `No. ${manifest.dates.length - idx} / ${manifest.dates.length}`;

      loadContent('stock', date);
      loadContent('ai-github', date);
    }

    function switchColumn(col) {
      currentColumn = col;
      document.querySelectorAll('.column-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.column-tab[data-col="${col}"]`).classList.add('active');
      document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
      document.getElementById(`content-${col}`).classList.add('active');
    }

    function getFilePath(colId, date) {
      const col = manifest.columns.find(c => c.id === colId);
      if (!col) return [];
      const primary = `data/${colId}/${col.filePattern.replace('{date}', date)}`;
      const alts = (col.altPatterns || []).map(p => `data/${colId}/${p.replace('{date}', date)}`);
      return [primary, ...alts];
    }

    async function loadContent(colId, date) {
      const cacheKey = `${colId}-${date}`;
      const loadingEl = document.getElementById(`loading-${colId}`);
      const articleEl = document.getElementById(`article-${colId}`);
      const mdEl = document.getElementById(`md-${colId}`);

      loadingEl.style.display = 'block';
      articleEl.style.display = 'none';

      if (contentCache[cacheKey]) {
        renderMarkdown(mdEl, contentCache[cacheKey]);
        loadingEl.style.display = 'none';
        articleEl.style.display = 'block';
        return;
      }

      const paths = getFilePath(colId, date);
      let content = null;

      for (const path of paths) {
        try {
          const res = await fetch(`${BASE_URL}${path}?t=${Date.now()}`);
          if (res.ok) { content = await res.text(); break; }
        } catch (e) { continue; }
      }

      loadingEl.style.display = 'none';

      if (content) {
        contentCache[cacheKey] = content;
        renderMarkdown(mdEl, content);
        articleEl.style.display = 'block';
      } else {
        articleEl.style.display = 'block';
        mdEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">—</div>
            <p>此日期尚無${colId === 'stock' ? '美股分析' : 'AI / GitHub 趨勢'}報告</p>
            <p style="font-size:12px;margin-top:6px;color:var(--text-light)">報告將在排程任務執行後自動產生</p>
          </div>`;
      }
    }

    function renderMarkdown(el, md) {
      const cleanMd = md
        .replace(/⚠️ 寄信失敗.*$/gm, '')
        .replace(/✅ (摘要已透過|Email).*$/gm, '')
        .replace(/⚠️ LINE 推播.*$/gm, '')
        .replace(/\[查看完整報告\].*$/gm, '')
        .trim();

      el.innerHTML = marked.parse(cleanMd);

      el.querySelectorAll('strong').forEach(strong => {
        const text = strong.textContent;
        if (text.includes('+') && text.match(/[\d.]+%/)) {
          strong.style.color = 'var(--accent-green)';
        } else if (text.includes('-') && text.match(/[\d.]+%/)) {
          strong.style.color = 'var(--accent-red)';
        }
      });
    }

    /* === Commodity Charts (TradingView Widgets) === */
    function renderCommodityCharts() {
      const grid = document.getElementById('commodityGrid');
      grid.innerHTML = '';

      // 顯示更新時間
      const now = new Date();
      const timeStr = now.getFullYear() + '/' + String(now.getMonth() + 1).padStart(2, '0') + '/' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      document.getElementById('commodityUpdated').textContent = '更新時間：' + timeStr;

      commodities.forEach(item => {
        const card = document.createElement('div');
        card.className = 'commodity-card';

        const widgetConfig = {
          symbol: item.symbol,
          width: '100%',
          height: '100%',
          locale: 'zh_TW',
          dateRange: '1M',
          colorTheme: 'light',
          isTransparent: true,
          autosize: true,
          largeChartUrl: '',
          noTimeScale: false,
          chartOnly: false
        };

        // Build header
        const header = document.createElement('div');
        header.className = 'commodity-card-header';
        header.innerHTML = '<span class="commodity-name">' + item.name + '</span><span class="commodity-name-en">' + item.nameEn + '</span>';
        card.appendChild(header);

        // Build chart container
        const chartDiv = document.createElement('div');
        chartDiv.className = 'commodity-chart';
        const container = document.createElement('div');
        container.className = 'tradingview-widget-container';
        const widgetEl = document.createElement('div');
        widgetEl.className = 'tradingview-widget-container__widget';
        container.appendChild(widgetEl);

        // Dynamically create script element (avoids breaking HTML parser)
        const scriptEl = document.createElement('script');
        scriptEl.type = 'text/javascript';
        scriptEl.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
        scriptEl.async = true;
        scriptEl.textContent = JSON.stringify(widgetConfig);
        container.appendChild(scriptEl);

        chartDiv.appendChild(container);
        card.appendChild(chartDiv);
        grid.appendChild(card);
      });
    }

    /* === Cycle Data === */
    async function loadCycleData() {
      try {
        const res = await fetch(`${BASE_URL}data/cycle/latest.json?t=${Date.now()}`);
        if (!res.ok) throw new Error('No cycle data');
        const data = await res.json();
        renderCycleCards(data);
      } catch (e) {
        console.log('No cycle data yet, showing defaults');
        renderCycleCards(getDefaultCycleData());
      }
    }

    function getDefaultCycleData() {
      return {
        updatedAt: new Date().toISOString().slice(0, 10),
        source: '初始預設值，待排程任務更新',
        cycles: [
          { name: 'DRAM', phase: 'growth', level: 70, trend: 'up', note: 'AI 伺服器帶動 HBM 需求強勁，DDR5 滲透率持續提升，ASP 穩定上漲', indicators: ['HBM 供不應求', 'DDR5 滲透率 55%+'] },
          { name: 'NAND Flash', phase: 'peak', level: 82, trend: 'flat', note: '企業級 SSD 需求穩健，但消費級 NAND 價格已出現季度下滑壓力', indicators: ['企業級需求穩健', '消費級價格承壓'] },
          { name: '晶圓代工', phase: 'growth', level: 72, trend: 'up', note: 'AI 晶片需求推動先進製程滿載，成熟製程受車用與工控需求支撐', indicators: ['先進製程滿載', '成熟製程利用率 80%'] },
          { name: '被動元件', phase: 'recovery', level: 38, trend: 'up', note: 'MLCC 庫存去化接近尾聲，車用與 AI 伺服器帶動高容值產品需求回溫', indicators: ['庫存水位下降', 'ASP 止跌'] },
          { name: '面板', phase: 'decline', level: 25, trend: 'down', note: 'TV 面板價格連續數月下跌，IT 面板需求疲弱，面板廠持續減產', indicators: ['TV 面板價格 QoQ -8%', '稼動率降至 72%'] },
          { name: 'PCB', phase: 'recovery', level: 42, trend: 'up', note: 'AI 伺服器用高層數 HDI/ABF 需求強勁，手機板需求季節性回溫', indicators: ['AI 伺服器板需求 +30%', '手機板回溫'] },
          { name: '車用晶片', phase: 'growth', level: 62, trend: 'flat', note: '電動車滲透率持續提升帶動功率半導體需求，但傳統車用 MCU 庫存仍偏高', indicators: ['EV 滲透率 28%', 'MCU 庫存偏高'] },
          { name: 'IC 設計', phase: 'growth', level: 65, trend: 'up', note: 'AI ASIC 設計需求爆發，手機 AP 新品週期啟動，但消費性 IC 復甦緩慢', indicators: ['AI ASIC 設計案 +50%', '消費 IC 緩慢復甦'] },
        ]
      };
    }

    const phaseMap = {
      bottom: { label: '谷底', class: 'phase-bottom' },
      recovery: { label: '復甦', class: 'phase-recovery' },
      growth: { label: '成長', class: 'phase-growth' },
      peak: { label: '高峰', class: 'phase-peak' },
      decline: { label: '衰退', class: 'phase-decline' },
    };

    const trendMap = {
      up: 'cycle-trend-up',
      down: 'cycle-trend-down',
      flat: 'cycle-trend-flat',
    };

    function renderCycleCards(data) {
      const container = document.getElementById('cycleCards');
      document.getElementById('cycleUpdated').textContent = `最近更新：${data.updatedAt}${data.source ? '　·　' + data.source : ''}`;

      const escapeHtml = s => String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

      let html = '';
      data.cycles.forEach(c => {
        const p = phaseMap[c.phase] || phaseMap.growth;
        const trendClass = trendMap[c.trend] || '';
        const indicatorsHtml = (c.indicators || []).map(i => `<span class="cycle-indicator">${escapeHtml(i)}</span>`).join('');
        const signalHtml = c.signal ? `<span class="cycle-signal cycle-signal-${c.signal}">${escapeHtml(c.signal)}</span>` : '';
        const watchlistHtml = c.watchlist ? `<div class="cycle-watchlist">關注標的｜<b>台股：</b>${escapeHtml(c.watchlist.tw || '-')}　<b>美股：</b>${escapeHtml(c.watchlist.us || '-')}</div>` : '';

        let scoreHtml = '';
        if (c.scoreBreakdown) {
          const sb = c.scoreBreakdown;
          const rows = [
            ['價格動能', sb.price],
            ['產能利用率', sb.utilization],
            ['庫存水位', sb.inventory],
            ['需求強度', sb.demand]
          ].map(([label, val]) => {
            const v = Number(val) || 0;
            return `<div class="cycle-score-row"><span>${label}</span><span><span class="cycle-score-bar" style="width:${v*2}px"></span>${v}/25</span></div>`;
          }).join('');
          const total = (Number(sb.price)||0)+(Number(sb.utilization)||0)+(Number(sb.inventory)||0)+(Number(sb.demand)||0);
          scoreHtml = `
            <details class="cycle-details">
              <summary>📊 評分明細（點擊展開）</summary>
              <div class="cycle-details-body">
                ${rows}
                <div class="cycle-score-row" style="border-top:1px solid #ddd;margin-top:6px;padding-top:6px;font-weight:600;"><span>合計</span><span>${total}/100</span></div>
                ${sb.rationale ? `<div style="margin-top:8px;color:#555;">${escapeHtml(sb.rationale)}</div>` : ''}
              </div>
            </details>
          `;
        }

        html += `
          <div class="cycle-card">
            <div class="cycle-card-top">
              <span class="cycle-card-name">${escapeHtml(c.name)}${signalHtml}</span>
              <span class="cycle-card-phase ${p.class}">${p.label}</span>
            </div>
            <div class="cycle-bar-container">
              <div class="cycle-bar-track">
                <div class="cycle-bar-segment"></div>
                <div class="cycle-bar-segment"></div>
                <div class="cycle-bar-segment"></div>
                <div class="cycle-bar-segment"></div>
                <div class="cycle-bar-segment"></div>
              </div>
              <div class="cycle-bar-pointer" style="left:${c.level}%"></div>
            </div>
            <div class="cycle-bar-labels">
              <span>谷底</span><span>復甦</span><span>成長</span><span>高峰</span><span>衰退</span>
            </div>
            <div class="cycle-card-indicators">${indicatorsHtml}</div>
            <div class="cycle-card-note ${trendClass}">${escapeHtml(c.note)}</div>
            ${watchlistHtml}
            ${scoreHtml}
          </div>
        `;
      });

      // 底部方法論（可摺疊）
      if (data.methodology) {
        const m = data.methodology;
        const dims = (m.dimensions || []).map(d => `<li><b>${escapeHtml(d.name)}</b>：${escapeHtml(d.desc)}</li>`).join('');
        const lims = (m.limitations || []).map(l => `<li>${escapeHtml(l)}</li>`).join('');
        html += `
          <details class="cycle-methodology">
            <summary>📐 評估依據與評分方法（點擊展開）</summary>
            <div style="margin-top:10px;line-height:1.7;">
              <p><b>評分框架</b>：${escapeHtml(m.framework || '')}</p>
              <ul>${dims}</ul>
              <p><b>Phase 對應</b>：${escapeHtml(m.phaseMapping || '')}</p>
              <p><b>Signal 規則</b>：${escapeHtml(m.signalRule || '')}</p>
              <p><b>方法論限制</b></p>
              <ul>${lims}</ul>
            </div>
          </details>
        `;
      }

      container.innerHTML = html;
    }

    /* === Scroll === */
    window.addEventListener('scroll', () => {
      document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 300);
    });

    /* === Init === */
    async function init() {
      const m = await loadManifest();
      if (!m) {
        document.querySelector('.main').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">—</div>
            <p>無法載入資料</p>
          </div>`;
        return;
      }
      currentDate = manifest.dates[0];
      renderDateNav();
      selectDate(currentDate);
    }

    init();
  </script>
</body>
</html>
